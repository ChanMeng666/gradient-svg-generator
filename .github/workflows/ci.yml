name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  check:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Contract tests (SVG byte-parity)
        run: npm run test:contract

      # `next build` type-checks internally, and generates .next/types/routes.d.ts
      # that next-env.d.ts references. A separate `tsc --noEmit` step would
      # fail in a clean CI without those generated types.
      - name: Build (includes typecheck)
        run: npm run build
