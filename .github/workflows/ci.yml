name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  check:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      # package-lock.json is gitignored by project policy, so npm ci won't work.
      # `npm install` is used instead; lockfile reproducibility is a Phase-2 concern.
      - name: Install dependencies
        run: npm install

      # next-env.d.ts is auto-generated by `next build` but our typecheck runs
      # first. Stamp it so tsc can resolve Next's types.
      - name: Stamp next-env.d.ts
        run: |
          cat > next-env.d.ts <<'EOF'
          /// <reference types="next" />
          /// <reference types="next/image-types/global" />
          EOF

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Contract tests (SVG byte-parity)
        run: npm run test:contract

      - name: Build
        run: npm run build
